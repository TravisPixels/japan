<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Japan Picks — Tokyo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f4f0; }
  header { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 14px 16px 10px; position: sticky; top: 0; z-index: 1000; }
  h1 { font-size: 17px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.3px; }
  .subtitle { font-size: 12px; color: #888; margin-top: 1px; }

  .filter-section { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 10px 16px; position: sticky; top: 53px; z-index: 999; }
  .group-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .sub-row { display: flex; gap: 6px; flex-wrap: nowrap; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0ec; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .sub-row::-webkit-scrollbar { display: none; }
  .sub-row.hidden { display: none; }

  .group-btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 20px; border: 1.5px solid; font-size: 12px; font-weight: 500; cursor: pointer; background: transparent; transition: all 0.15s; white-space: nowrap; }
  .group-btn .material-symbols-rounded { font-size: 15px; }

  .sub-btn { display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; border: 1px solid; font-size: 11px; font-weight: 500; cursor: pointer; background: transparent; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
  .sub-btn .material-symbols-rounded { font-size: 13px; }

  .group-btn[data-group="all"] { border-color: #515151; color: #515151; }
  .group-btn[data-group="all"].active { background: #515151; color: #fff; }
  .group-btn[data-group="food"] { border-color: #d6344c; color: #d6344c; }
  .group-btn[data-group="food"].active { background: #d6344c; color: #fff; }
  .group-btn[data-group="attractions"] { border-color: #0f7046; color: #0f7046; }
  .group-btn[data-group="attractions"].active { background: #0f7046; color: #fff; }

  /* Food subcategory colors */
  .sub-btn[data-type="Drinks"] { border-color: #4068b1; color: #4068b1; }
  .sub-btn[data-type="Drinks"].active { background: #4068b1; color: #fff; }
  .sub-btn[data-type="Beer"] { border-color: #d87216; color: #d87216; }
  .sub-btn[data-type="Beer"].active { background: #d87216; color: #fff; }
  .sub-btn[data-type="Cocktails"] { border-color: #9156a2; color: #9156a2; }
  .sub-btn[data-type="Cocktails"].active { background: #9156a2; color: #fff; }
  .sub-btn[data-type="Café/Kissaten"] { border-color: #502c17; color: #502c17; }
  .sub-btn[data-type="Café/Kissaten"].active { background: #502c17; color: #fff; }
  .sub-btn[data-type="Sweets"] { border-color: #f59db6; color: #f59db6; }
  .sub-btn[data-type="Sweets"].active { background: #f59db6; color: #fff; }
  .sub-btn[data-type="Bakery"] { border-color: #8d562f; color: #8d562f; }
  .sub-btn[data-type="Bakery"].active { background: #8d562f; color: #fff; }
  .sub-btn[data-type="Restaurant"] { border-color: #213f7c; color: #213f7c; }
  .sub-btn[data-type="Restaurant"].active { background: #213f7c; color: #fff; }
  .sub-btn[data-type="Street Food"] { border-color: #c65474; color: #c65474; }
  .sub-btn[data-type="Street Food"].active { background: #c65474; color: #fff; }
  .sub-btn[data-type="Izakaya"] { border-color: #931a1d; color: #931a1d; }
  .sub-btn[data-type="Izakaya"].active { background: #931a1d; color: #fff; }
  .sub-btn[data-type="Sushi"] { border-color: #73bbd8; color: #73bbd8; }
  .sub-btn[data-type="Sushi"].active { background: #73bbd8; color: #fff; }
  .sub-btn[data-type="Yakitori"] { border-color: #ee265e; color: #ee265e; }
  .sub-btn[data-type="Yakitori"].active { background: #ee265e; color: #fff; }
  .sub-btn[data-type="Noodles"] { border-color: #d1bb9b; color: #d1bb9b; }
  .sub-btn[data-type="Noodles"].active { background: #d1bb9b; color: #fff; }
  .sub-btn[data-type="Pizza"] { border-color: #fbb166; color: #fbb166; }
  .sub-btn[data-type="Pizza"].active { background: #fbb166; color: #fff; }

  /* Attractions subcategory colors */
  .sub-btn[data-type="Shopping"] { border-color: #f3b422; color: #f3b422; }
  .sub-btn[data-type="Shopping"].active { background: #f3b422; color: #fff; }
  .sub-btn[data-type="Market"] { border-color: #ffa015; color: #ffa015; }
  .sub-btn[data-type="Market"].active { background: #ffa015; color: #fff; }
  .sub-btn[data-type="Photo Spot"] { border-color: #3d3d3d; color: #3d3d3d; }
  .sub-btn[data-type="Photo Spot"].active { background: #3d3d3d; color: #fff; }
  .sub-btn[data-type="Museum"] { border-color: #c8a7cf; color: #c8a7cf; }
  .sub-btn[data-type="Museum"].active { background: #c8a7cf; color: #fff; }
  .sub-btn[data-type="Temple/Shrine"] { border-color: #df3e26; color: #df3e26; }
  .sub-btn[data-type="Temple/Shrine"].active { background: #df3e26; color: #fff; }
  .sub-btn[data-type="Park"] { border-color: #8ec965; color: #8ec965; }
  .sub-btn[data-type="Park"].active { background: #8ec965; color: #fff; }
  .sub-btn[data-type="Nature"] { border-color: #2d7a3c; color: #2d7a3c; }
  .sub-btn[data-type="Nature"].active { background: #2d7a3c; color: #fff; }

  .status-bar { font-size: 12px; color: #888; padding: 6px 16px; background: #f5f4f0; }
  #map { height: calc(100vh - 160px); width: 100%; }
  .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .leaflet-popup-content { margin: 12px 14px; }
  .popup-name { font-weight: 600; font-size: 14px; color: #1a1a1a; margin-bottom: 4px; }
  .popup-type { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; margin-bottom: 8px; background: #f0f0ec; color: #555; }
  .popup-toggle { display: inline-block; padding: 5px 12px; font-size: 12px; font-weight: 500; border-radius: 6px; cursor: pointer; border: none; text-align: left; margin: 4px 0; }
  .popup-toggle.notes { background: #e8e8e8; color: #666; }
  .popup-hours-today { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: #444; margin: 6px 0 2px; cursor: pointer; padding: 4px 0; }
  .popup-hours-today span { font-weight: 600; }
  .popup-hours-today .arrow { font-size: 14px; color: #8db8c9; margin-left: 6px; }
  .popup-hours-all { font-size: 11px; color: #444; margin: 2px 0 6px; line-height: 1.8; display: none; border-top: 1px solid #f0f0ec; padding-top: 4px; }
  .popup-notes { font-size: 12px; color: #555; margin: 4px 0 6px; line-height: 1.5; display: none; }
  .popup-row { font-size: 12px; color: #555; margin: 3px 0; line-height: 1.5; }
  .popup-row b { color: #333; }
  .popup-link { display: inline-block; margin-top: 8px; font-size: 12px; color: #534AB7; text-decoration: none; font-weight: 500; }
  .dir-buttons { display: flex; gap: 6px; margin-top: 10px; }
  .dir-btn { flex: 1; text-align: center; padding: 6px 0; font-size: 12px; font-weight: 500; border-radius: 6px; text-decoration: none; }
  .dir-btn.google { background: #E8F0FE; color: #1A73E8; }
  .dir-btn.apple { background: #F0F0F0; color: #333; }

  .material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 20; }
</style>
</head>
<body>

<header>
  <h1>Japan Picks</h1>

</header>

<div class="filter-section">
  <div class="group-row">
    <button class="group-btn" data-group="all">
      <span class="material-symbols-rounded">map</span> Show All

  <div class="sub-row hidden" id="sub-food">

    <button class="sub-btn" data-type="Izakaya"><span class="material-symbols-rounded">washoku</span> Izakaya</button>
    <button class="sub-btn" data-type="Sushi"><span class="material-symbols-rounded">set_meal</span> Sushi</button>
    <button class="sub-btn" data-type="Yakitori"><span class="material-symbols-rounded">yakitori</span> Yakitori</button>
    <button class="sub-btn" data-type="Noodles"><span class="material-symbols-rounded">ramen_dining</span> Noodles</button>

    <button class="sub-btn" data-type="Temple/Shrine"><span class="material-symbols-rounded">temple_buddhist</span> Temple/Shrine</button>

  </div>
</div>

<div class="status-bar" id="status">Loading...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSMvnlVip8wkjc0QtA7f_uzhqIWoLTpPjE-eOHVqkE0FP3mzFQM0JxUrjNBX_dt2lnXgEYBNJsI9TkV/pub?output=csv&gid=';
const SHEETS = [
  { name: 'Tokyo',     gid: '0' },
  { name: 'Kyoto',     gid: '1748242203' },
  { name: 'Osaka',     gid: '1776834839' },
  { name: 'Kamakura',  gid: '1170421930' },
  { name: 'Enoshima',  gid: '1589673722' },
  { name: 'Hakone',    gid: '332853555' },
  { name: 'Odawara',   gid: '401512297' },
  { name: 'Yokohama',  gid: '1842414474' },
];

const GROUPS = {
  food: ['Beer','Cocktails','Drinks','Café/Kissaten','Izakaya','Sushi','Yakitori','Noodles','Sweets','Bakery','Pizza','Street Food','Restaurant'],
  attractions: ['Museum','Park','Temple/Shrine','Shopping','Market','Photo Spot','Nature']
};

const ALL_TYPES = [...GROUPS.food, ...GROUPS.attractions];

const COLORS = {
  Beer: '#d87216', Cocktails: '#9156a2', Drinks: '#4068b1',
  'Café/Kissaten': '#502c17', Izakaya: '#931a1d', Sushi: '#73bbd8',
  Yakitori: '#ee265e', Noodles: '#d1bb9b', Sweets: '#f59db6',
  Bakery: '#8d562f', Pizza: '#fbb166', 'Street Food': '#c65474', Restaurant: '#213f7c',
  Museum: '#c8a7cf', Park: '#8ec965', 'Temple/Shrine': '#df3e26',
  Shopping: '#f3b422', 'Photo Spot': '#3d3d3d', Nature: '#2d7a3c', Market: '#ffa015'
};

const ICONS = {
  Beer: 'sports_bar', Cocktails: 'local_bar', Drinks: 'glass_cup',
  'Café/Kissaten': 'coffee', Izakaya: 'washoku', Sushi: 'set_meal',
  Yakitori: 'yakitori', Noodles: 'ramen_dining', Sweets: 'cookie',
  Bakery: 'bakery_dining', Pizza: 'local_pizza', 'Street Food': 'hanami_dango', Restaurant: 'dinner_dining',
  Museum: 'museum', Park: 'park', 'Temple/Shrine': 'temple_buddhist',
  Shopping: 'shopping_bag', 'Photo Spot': 'photo_camera', Nature: 'landscape', Market: 'storefront'
};

const map = L.map('map', { worldCopyJump: true }).setView([35.6762, 139.6503], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19
}).addTo(map);

let allMarkers = [];
let activeGroup = null;
let activeSubTypes = new Set();

function makeIcon(type) {
  const color = COLORS[type] || '#888';
  const icon = ICONS[type] || 'place';
  const html = `
    <div style="position:relative;width:32px;height:40px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
        <path d="M16 0C7.16 0 0 7.16 0 16c0 10.67 16 24 16 24S32 26.67 32 16C32 7.16 24.84 0 16 0z" fill="${color}"/>
      </svg>
      <span class="material-symbols-rounded" style="position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:16px;color:white;line-height:1;">${icon}</span>
    </div>`;
  return L.divIcon({ html, className: '', iconSize: [32,40], iconAnchor: [16,40], popupAnchor: [0,-40] });
}

function parseHours(hoursStr) {
  if (!hoursStr) return '';
  const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const DAY_INDEX = { mon:0, tue:1, wed:2, thu:3, fri:4, sat:5, sun:6 };
  const result = new Array(7).fill(null);

  const segments = hoursStr.split(',').map(s => s.trim()).filter(Boolean);
  for (const seg of segments) {
    const match = seg.match(/^([a-zA-Z]+)(?:-([a-zA-Z]+))?\s+(.+)$/i);
    if (!match) continue;
    const startDay = match[1].toLowerCase().slice(0,3);
    const endDay = match[2] ? match[2].toLowerCase().slice(0,3) : null;
    const time = match[3].trim().toUpperCase() === 'CLOSED' ? 'CLOSED' : match[3].trim().replace(/([0-9])(am|pm)/gi, (m, n, p) => n + p.toUpperCase());
    const startIdx = DAY_INDEX[startDay];
    const endIdx = endDay ? DAY_INDEX[endDay] : startIdx;
    if (startIdx === undefined) continue;
    if (endIdx !== undefined && endIdx >= startIdx) {
      for (let i = startIdx; i <= endIdx; i++) result[i] = time;
    } else if (endIdx !== undefined) {
      for (let i = startIdx; i < 7; i++) result[i] = time;
      for (let i = 0; i <= endIdx; i++) result[i] = time;
    } else {
      result[startIdx] = time;
    }
  }

  return DAYS.map((day, i) => {
    if (result[i] === null) return null;
    const t = result[i] === 'CLOSED' || result[i].toLowerCase() === 'closed' ? 'CLOSED' : result[i];
    return `<span style="font-weight:600">${day.toUpperCase()}</span> ${t}`;
  }).filter(Boolean).join('<br>');
}

function getTodayIndex() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

function makePopup(r) {
  const parts = r.coords.split(',');
  const lat = parts[0].trim(), lng = parts[1].trim();
  const gMapsUrl = r.mapsLink || `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  const id = Math.random().toString(36).slice(2, 8);

  let hoursSection = '';
  if (r.hours) {
    const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const allHours = parseHours(r.hours);
    const todayIdx = getTodayIndex();
    const todayDay = DAYS[todayIdx].toUpperCase();

    const DAY_INDEX = { mon:0, tue:1, wed:2, thu:3, fri:4, sat:5, sun:6 };
    const result = new Array(7).fill(null);
    const segments = r.hours.split(',').map(s => s.trim()).filter(Boolean);
    for (const seg of segments) {
      const match = seg.match(/^([a-zA-Z]+)(?:-([a-zA-Z]+))?\s+(.+)$/i);
      if (!match) continue;
      const startDay = match[1].toLowerCase().slice(0,3);
      const endDay = match[2] ? match[2].toLowerCase().slice(0,3) : null;
      const time = match[3].trim().toUpperCase() === 'CLOSED' ? 'CLOSED' : match[3].trim().replace(/([0-9])(am|pm)/gi, (m, n, p) => n + p.toUpperCase());
      const startIdx = DAY_INDEX[startDay];
      const endIdx = endDay ? DAY_INDEX[endDay] : startIdx;
      if (startIdx === undefined) continue;
      if (endIdx !== undefined && endIdx >= startIdx) {
        for (let i = startIdx; i <= endIdx; i++) result[i] = time;
      } else if (endIdx !== undefined) {
        for (let i = startIdx; i < 7; i++) result[i] = time;
        for (let i = 0; i <= endIdx; i++) result[i] = time;
      } else {
        result[startIdx] = time;
      }
    }

    const todayHours = result[todayIdx] || '—';
    const allHoursExceptToday = DAYS.map((day, i) => {
      if (i === todayIdx) return null;
      if (result[i] === null) return null;
      const t = result[i] === 'CLOSED' || result[i].toLowerCase() === 'closed' ? 'CLOSED' : result[i];
      return `<span style="font-weight:600">${day.toUpperCase()}</span> ${t}`;
    }).filter(Boolean).join('<br>');

    hoursSection = `
      <div class="popup-hours-today" onclick="var el=document.getElementById('h-${id}');var arr=document.getElementById('arr-${id}');var open=el.style.display==='block';el.style.display=open?'none':'block';arr.textContent=open?'▾':'▴';">
        <span>${todayDay}</span>&nbsp;${todayHours}
        <span class="arrow" id="arr-${id}">▾</span>
      </div>
      <div class="popup-hours-all" id="h-${id}">${allHoursExceptToday}</div>`;
  }

  return `
    <div class="popup-name">${r.name}</div>
    <span class="popup-type">${r.type}</span>
    ${hoursSection}
    ${r.notes ? `<div class="popup-row" style="margin-top:6px">${r.notes}</div>` : ''}
    ${r.link ? `<a class="popup-link" href="${r.link}" target="_blank">View link ↗</a>` : ''}
    <div class="dir-buttons">
      <a href="${gMapsUrl}" target="_blank" class="dir-btn google">Open in Maps</a>
    </div>`;
}

function refreshMarkers() {
  allMarkers.forEach(({marker, type}) => {
    let show = false;
    if (activeGroup === null) {
      show = false;
    } else if (activeGroup === 'all') {
      show = true;
    } else if (activeSubTypes.size === 0) {
      show = GROUPS[activeGroup].includes(type);
    } else {
      show = activeSubTypes.has(type);
    }
    if (show) map.addLayer(marker);
    else map.removeLayer(marker);
  });
}

document.querySelectorAll('.group-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.dataset.group;

    if (group === 'all') {
      const isActive = btn.classList.contains('active');
      document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.sub-row').forEach(r => r.classList.add('hidden'));
      document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
      activeSubTypes.clear();
      if (isActive) {
        activeGroup = null;
      } else {
        btn.classList.add('active');
        activeGroup = 'all';
      }
      refreshMarkers();
      return;
    }

    const subRow = document.getElementById('sub-' + group);
    const otherGroup = group === 'food' ? 'attractions' : 'food';
    const otherSubRow = document.getElementById('sub-' + otherGroup);
    const otherBtn = document.querySelector(`.group-btn[data-group="${otherGroup}"]`);
    const allBtn = document.querySelector('.group-btn[data-group="all"]');

    if (activeGroup === group) {
      btn.classList.remove('active');
      subRow.classList.add('hidden');
      activeGroup = null;
      activeSubTypes.clear();
      document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
    } else {
      btn.classList.add('active');
      subRow.classList.remove('hidden');
      otherBtn.classList.remove('active');
      allBtn.classList.remove('active');
      otherSubRow.classList.add('hidden');
      document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
      activeGroup = group;
      activeSubTypes.clear();
    }
    refreshMarkers();
  });
});

document.querySelectorAll('.sub-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.type;
    if (activeSubTypes.has(type)) {
      activeSubTypes.delete(type);
      btn.classList.remove('active');
    } else {
      activeSubTypes.add(type);
      btn.classList.add('active');
    }
    refreshMarkers();
  });
});

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = []; let cur = '', inQ = false;
    for (const ch of lines[i]) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur.trim().replace(/^"|"$/g, '')); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim().replace(/^"|"$/g, ''));
    if (cols[0] && cols[0] !== 'NAME') {
      rows.push({
        name: cols[0], type: cols[1], location: cols[2], coords: cols[3],
        mapsLink: cols[4]||'', hours: cols[5]||'', notes: cols[6]||'',
        link: cols[7]||'', address: cols[8]||''
      });
    }
  }
  return rows;
}

let locationDot = null, locationRing = null;

function placeOrMoveDot(lat, lng) {
  if (locationDot) {
    locationDot.setLatLng([lat, lng]);
    locationRing.setLatLng([lat, lng]);
  } else {
    locationRing = L.circleMarker([lat, lng], {
      radius: 20, fillColor: '#4A90E2', fillOpacity: 0.15, color: '#4A90E2', weight: 1
    }).addTo(map);
    locationDot = L.circleMarker([lat, lng], {
      radius: 10, fillColor: '#4A90E2', fillOpacity: 1, color: '#fff', weight: 3
    }).addTo(map).bindPopup('You are here');
  }
}

function locateUser() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    pos => placeOrMoveDot(pos.coords.latitude, pos.coords.longitude),
    null, { enableHighAccuracy: true }
  );
  navigator.geolocation.watchPosition(
    pos => placeOrMoveDot(pos.coords.latitude, pos.coords.longitude),
    null, { enableHighAccuracy: true }
  );
}

locateUser();

async function loadData() {
  let totalLoaded = 0;
  for (const sheet of SHEETS) {
    try {
      const res = await fetch(BASE_URL + sheet.gid);
      if (!res.ok) continue;
      const text = await res.text();
      const rows = parseCSV(text).filter(r => ALL_TYPES.includes(r.type) && r.coords);
      for (const row of rows) {
        const parts = row.coords.split(',');
        if (parts.length !== 2) continue;
        const lat = parseFloat(parts[0].trim());
        const lng = parseFloat(parts[1].trim());
        if (isNaN(lat) || isNaN(lng)) continue;
        const marker = L.marker([lat, lng], { icon: makeIcon(row.type) })
          .bindPopup(makePopup(row), { maxWidth: 260 });
        allMarkers.push({ marker, type: row.type });
        totalLoaded++;
      }
    } catch(e) {}
  }
  document.getElementById('status').textContent = `${totalLoaded} location${totalLoaded !== 1 ? 's' : ''} loaded. Select a category to explore.`;
  refreshMarkers();
}

document.querySelector('.group-btn[data-group="all"]').classList.add('active');
activeGroup = 'all';
loadData();
</script>
