<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Japan Picks — Tokyo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f4f0; }
  header { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 14px 16px 10px; position: sticky; top: 0; z-index: 1000; }
  h1 { font-size: 17px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.3px; }
  .subtitle { font-size: 12px; color: #888; margin-top: 1px; }

  .filter-section { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 10px 16px; position: sticky; top: 53px; z-index: 999; }
  .group-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .sub-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0ec; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .sub-row::-webkit-scrollbar { display: none; }
  .sub-row.hidden { display: none; }

  .group-btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 20px; border: 1.5px solid; font-size: 12px; font-weight: 500; cursor: pointer; background: transparent; transition: all 0.15s; white-space: nowrap; }
  .group-btn .material-symbols-rounded { font-size: 15px; }

  .sub-btn { display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; border: 1px solid; font-size: 11px; font-weight: 500; cursor: pointer; background: transparent; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
  .sub-btn .material-symbols-rounded { font-size: 13px; }

  .group-btn[data-group="all"] { border-color: #444; color: #444; }
  .group-btn[data-group="all"].active { background: #444; color: #fff; }
  /* Group: Food & Drink — amber */
  .group-btn[data-group="food"] { border-color: #B8860B; color: #B8860B; }
  .group-btn[data-group="food"].active { background: #B8860B; color: #fff; }
  /* Group: Attractions — teal */
  .group-btn[data-group="attractions"] { border-color: #0F6E56; color: #0F6E56; }
  .group-btn[data-group="attractions"].active { background: #0F6E56; color: #fff; }

  /* Food subcategory colors */
  .sub-btn[data-type="Beer"] { border-color: #C17A2A; color: #C17A2A; }
  .sub-btn[data-type="Beer"].active { background: #C17A2A; color: #fff; }
  .sub-btn[data-type="Cocktails"] { border-color: #9B4D8E; color: #9B4D8E; }
  .sub-btn[data-type="Cocktails"].active { background: #9B4D8E; color: #fff; }
  .sub-btn[data-type="Drinks"] { border-color: #2E86AB; color: #2E86AB; }
  .sub-btn[data-type="Drinks"].active { background: #2E86AB; color: #fff; }
  .sub-btn[data-type="Café/Kissaten"] { border-color: #7B5B3A; color: #7B5B3A; }
  .sub-btn[data-type="Café/Kissaten"].active { background: #7B5B3A; color: #fff; }
  .sub-btn[data-type="Izakaya"] { border-color: #C0392B; color: #C0392B; }
  .sub-btn[data-type="Izakaya"].active { background: #C0392B; color: #fff; }
  .sub-btn[data-type="Sushi"] { border-color: #1A6B8A; color: #1A6B8A; }
  .sub-btn[data-type="Sushi"].active { background: #1A6B8A; color: #fff; }
  .sub-btn[data-type="Yakitori"] { border-color: #B5451B; color: #B5451B; }
  .sub-btn[data-type="Yakitori"].active { background: #B5451B; color: #fff; }
  .sub-btn[data-type="Noodles"] { border-color: #7B7B00; color: #7B7B00; }
  .sub-btn[data-type="Noodles"].active { background: #7B7B00; color: #fff; }
  .sub-btn[data-type="Sweets"] { border-color: #C2558B; color: #C2558B; }
  .sub-btn[data-type="Sweets"].active { background: #C2558B; color: #fff; }
  .sub-btn[data-type="Bakery"] { border-color: #A0783A; color: #A0783A; }
  .sub-btn[data-type="Bakery"].active { background: #A0783A; color: #fff; }
  .sub-btn[data-type="Pizza"] { border-color: #C0392B; color: #C0392B; }
  .sub-btn[data-type="Pizza"].active { background: #C0392B; color: #fff; }
  .sub-btn[data-type="Street Food"] { border-color: #E07B39; color: #E07B39; }
  .sub-btn[data-type="Street Food"].active { background: #E07B39; color: #fff; }

  /* Attractions subcategory colors */
  .sub-btn[data-type="Museum"] { border-color: #5B4A9B; color: #5B4A9B; }
  .sub-btn[data-type="Museum"].active { background: #5B4A9B; color: #fff; }
  .sub-btn[data-type="Park"] { border-color: #2E7D32; color: #2E7D32; }
  .sub-btn[data-type="Park"].active { background: #2E7D32; color: #fff; }
  .sub-btn[data-type="Temple/Shrine"] { border-color: #7B3F00; color: #7B3F00; }
  .sub-btn[data-type="Temple/Shrine"].active { background: #7B3F00; color: #fff; }
  .sub-btn[data-type="Shopping"] { border-color: #1565C0; color: #1565C0; }
  .sub-btn[data-type="Shopping"].active { background: #1565C0; color: #fff; }
  .sub-btn[data-type="Photo Spot"] { border-color: #37474F; color: #37474F; }
  .sub-btn[data-type="Photo Spot"].active { background: #37474F; color: #fff; }

  .status-bar { font-size: 12px; color: #888; padding: 6px 16px; background: #f5f4f0; }
  #map { height: calc(100vh - 160px); width: 100%; }
  .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .leaflet-popup-content { margin: 12px 14px; }
  .popup-name { font-weight: 600; font-size: 14px; color: #1a1a1a; margin-bottom: 4px; }
  .popup-type { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; margin-bottom: 8px; background: #f0f0ec; color: #555; }
  .popup-row { font-size: 12px; color: #555; margin: 3px 0; line-height: 1.5; }
  .popup-row b { color: #333; }
  .popup-link { display: inline-block; margin-top: 8px; font-size: 12px; color: #534AB7; text-decoration: none; font-weight: 500; }
  .dir-buttons { display: flex; gap: 6px; margin-top: 10px; }
  .dir-btn { flex: 1; text-align: center; padding: 6px 0; font-size: 12px; font-weight: 500; border-radius: 6px; text-decoration: none; }
  .dir-btn.google { background: #E8F0FE; color: #1A73E8; }
  .dir-btn.apple { background: #F0F0F0; color: #333; }

  .material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 20; }
</style>
</head>
<body>

<header>
  <h1>Japan Picks</h1>
  <div class="subtitle">Tokyo</div>
</header>

<div class="filter-section">
  <div class="group-row">
    <button class="group-btn" data-group="all">
      <span class="material-symbols-rounded">map</span> Show All
    </button>
    <button class="group-btn" data-group="food">
      <span class="material-symbols-rounded">restaurant</span> Food & Drink
    </button>
    <button class="group-btn" data-group="attractions">
      <span class="material-symbols-rounded">location_on</span> Attractions
    </button>
  </div>

  <div class="sub-row hidden" id="sub-food">
    <button class="sub-btn" data-type="Beer"><span class="material-symbols-rounded">sports_bar</span> Beer</button>
    <button class="sub-btn" data-type="Cocktails"><span class="material-symbols-rounded">local_bar</span> Cocktails</button>
    <button class="sub-btn" data-type="Drinks"><span class="material-symbols-rounded">emoji_food_beverage</span> Drinks</button>
    <button class="sub-btn" data-type="Café/Kissaten"><span class="material-symbols-rounded">coffee</span> Café/Kissaten</button>
    <button class="sub-btn" data-type="Izakaya"><span class="material-symbols-rounded">izakaya_lantern</span> Izakaya</button>
    <button class="sub-btn" data-type="Sushi"><span class="material-symbols-rounded">set_meal</span> Sushi</button>
    <button class="sub-btn" data-type="Yakitori"><span class="material-symbols-rounded">outdoor_grill</span> Yakitori</button>
    <button class="sub-btn" data-type="Noodles"><span class="material-symbols-rounded">ramen_dining</span> Noodles</button>
    <button class="sub-btn" data-type="Sweets"><span class="material-symbols-rounded">cake</span> Sweets</button>
    <button class="sub-btn" data-type="Bakery"><span class="material-symbols-rounded">bakery_dining</span> Bakery</button>
    <button class="sub-btn" data-type="Pizza"><span class="material-symbols-rounded">local_pizza</span> Pizza</button>
    <button class="sub-btn" data-type="Street Food"><span class="material-symbols-rounded">kebab_dining</span> Street Food</button>
  </div>

  <div class="sub-row hidden" id="sub-attractions">
    <button class="sub-btn" data-type="Museum"><span class="material-symbols-rounded">museum</span> Museum</button>
    <button class="sub-btn" data-type="Park"><span class="material-symbols-rounded">park</span> Park</button>
    <button class="sub-btn" data-type="Temple/Shrine"><span class="material-symbols-rounded">temple_buddhist</span> Temple/Shrine</button>
    <button class="sub-btn" data-type="Shopping"><span class="material-symbols-rounded">shopping_bag</span> Shopping</button>
    <button class="sub-btn" data-type="Photo Spot"><span class="material-symbols-rounded">photo_camera</span> Photo Spot</button>
  </div>
</div>

<div class="status-bar" id="status">Loading...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSMvnlVip8wkjc0QtA7f_uzhqIWoLTpPjE-eOHVqkE0FP3mzFQM0JxUrjNBX_dt2lnXgEYBNJsI9TkV/pub?gid=0&single=true&output=csv';

const GROUPS = {
  food: ['Beer','Cocktails','Drinks','Café/Kissaten','Izakaya','Sushi','Yakitori','Noodles','Sweets','Bakery','Pizza','Street Food'],
  attractions: ['Museum','Park','Temple/Shrine','Shopping','Photo Spot']
};

const ALL_TYPES = [...GROUPS.food, ...GROUPS.attractions];

const COLORS = {
  Beer: '#C17A2A', Cocktails: '#9B4D8E', Drinks: '#2E86AB',
  'Café/Kissaten': '#7B5B3A', Izakaya: '#C0392B', Sushi: '#1A6B8A',
  Yakitori: '#B5451B', Noodles: '#7B7B00', Sweets: '#C2558B',
  Bakery: '#A0783A', Pizza: '#C0392B', 'Street Food': '#E07B39',
  Museum: '#5B4A9B', Park: '#2E7D32', 'Temple/Shrine': '#7B3F00',
  Shopping: '#1565C0', 'Photo Spot': '#37474F'
};

const ICONS = {
  Beer: 'sports_bar', Cocktails: 'local_bar', Drinks: 'emoji_food_beverage',
  'Café/Kissaten': 'coffee', Izakaya: 'izakaya_lantern', Sushi: 'set_meal',
  Yakitori: 'outdoor_grill', Noodles: 'ramen_dining', Sweets: 'cake',
  Bakery: 'bakery_dining', Pizza: 'local_pizza', 'Street Food': 'kebab_dining',
  Museum: 'museum', Park: 'park', 'Temple/Shrine': 'temple_buddhist',
  Shopping: 'shopping_bag', 'Photo Spot': 'photo_camera'
};

const map = L.map('map', { worldCopyJump: true }).setView([35.6762, 139.6503], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19
}).addTo(map);

let allMarkers = [];
let activeGroup = null;
let activeSubTypes = new Set();

function makeIcon(type) {
  const color = COLORS[type] || '#888';
  const icon = ICONS[type] || 'place';
  const html = `
    <div style="position:relative;width:32px;height:40px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
        <path d="M16 0C7.16 0 0 7.16 0 16c0 10.67 16 24 16 24S32 26.67 32 16C32 7.16 24.84 0 16 0z" fill="${color}"/>
      </svg>
      <span class="material-symbols-rounded" style="position:absolute;top:5px;left:50%;transform:translateX(-50%);font-size:16px;color:white;line-height:1;">${icon}</span>
    </div>`;
  return L.divIcon({ html, className: '', iconSize: [32,40], iconAnchor: [16,40], popupAnchor: [0,-40] });
}

function makePopup(r) {
  const parts = r.coords.split(',');
  const lat = parts[0].trim(), lng = parts[1].trim();
  const gMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  const aMapsUrl = `https://maps.apple.com/?daddr=${lat},${lng}`;
  return `
    <div class="popup-name">${r.name}</div>
    <span class="popup-type">${r.type}</span>
    ${r.hours ? `<div class="popup-row"><b>Hours:</b> ${r.hours}</div>` : ''}
    ${r.notes ? `<div class="popup-row"><b>Notes:</b> ${r.notes}</div>` : ''}
    ${r.link ? `<a class="popup-link" href="${r.link}" target="_blank">View link ↗</a>` : ''}
    <div class="dir-buttons">
      <a href="${gMapsUrl}" target="_blank" class="dir-btn google">Google Maps</a>
      <a href="${aMapsUrl}" target="_blank" class="dir-btn apple">Apple Maps</a>
    </div>`;
}

function refreshMarkers() {
  allMarkers.forEach(({marker, type}) => {
    let show = false;
    if (activeGroup === null) {
      show = false;
    } else if (activeGroup === 'all') {
      show = true;
    } else if (activeSubTypes.size === 0) {
      show = GROUPS[activeGroup].includes(type);
    } else {
      show = activeSubTypes.has(type);
    }
    if (show) map.addLayer(marker);
    else map.removeLayer(marker);
  });
}

document.querySelectorAll('.group-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.dataset.group;

    if (group === 'all') {
      const isActive = btn.classList.contains('active');
      document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.sub-row').forEach(r => r.classList.add('hidden'));
      document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
      activeSubTypes.clear();
      if (isActive) {
        activeGroup = null;
      } else {
        btn.classList.add('active');
        activeGroup = 'all';
      }
      refreshMarkers();
      return;
    }

    const subRow = document.getElementById('sub-' + group);
    const otherGroup = group === 'food' ? 'attractions' : 'food';
    const otherSubRow = document.getElementById('sub-' + otherGroup);
    const otherBtn = document.querySelector(`.group-btn[data-group="${otherGroup}"]`);
    const allBtn = document.querySelector('.group-btn[data-group="all"]');

    if (activeGroup === group) {
      btn.classList.remove('active');
      subRow.classList.add('hidden');
      activeGroup = null;
      activeSubTypes.clear();
      document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
    } else {
      btn.classList.add('active');
      subRow.classList.remove('hidden');
      otherBtn.classList.remove('active');
      allBtn.classList.remove('active');
      otherSubRow.classList.add('hidden');
      document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
      activeGroup = group;
      activeSubTypes.clear();
    }
    refreshMarkers();
  });
});

document.querySelectorAll('.sub-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.type;
    if (activeSubTypes.has(type)) {
      activeSubTypes.delete(type);
      btn.classList.remove('active');
    } else {
      activeSubTypes.add(type);
      btn.classList.add('active');
    }
    refreshMarkers();
  });
});

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = []; let cur = '', inQ = false;
    for (const ch of lines[i]) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur.trim().replace(/^"|"$/g, '')); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim().replace(/^"|"$/g, ''));
    if (cols[0] && cols[0] !== 'NAME') {
      rows.push({
        name: cols[0], type: cols[1], location: cols[2], coords: cols[3],
        hours: cols[4]||'', address: cols[5]||'', notes: cols[6]||'', link: cols[7]||''
      });
    }
  }
  return rows;
}

let locationDot = null, locationRing = null;

function placeOrMoveDot(lat, lng) {
  if (locationDot) {
    locationDot.setLatLng([lat, lng]);
    locationRing.setLatLng([lat, lng]);
  } else {
    locationRing = L.circleMarker([lat, lng], {
      radius: 20, fillColor: '#4A90E2', fillOpacity: 0.15, color: '#4A90E2', weight: 1
    }).addTo(map);
    locationDot = L.circleMarker([lat, lng], {
      radius: 10, fillColor: '#4A90E2', fillOpacity: 1, color: '#fff', weight: 3
    }).addTo(map).bindPopup('You are here');
  }
}

function locateUser() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    pos => placeOrMoveDot(pos.coords.latitude, pos.coords.longitude),
    null, { enableHighAccuracy: true }
  );
  navigator.geolocation.watchPosition(
    pos => placeOrMoveDot(pos.coords.latitude, pos.coords.longitude),
    null, { enableHighAccuracy: true }
  );
}

locateUser();

async function loadData() {
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error();
    const text = await res.text();
    const rows = parseCSV(text).filter(r => ALL_TYPES.includes(r.type) && r.coords);

    let loaded = 0;
    for (const row of rows) {
      const parts = row.coords.split(',');
      if (parts.length !== 2) continue;
      const lat = parseFloat(parts[0].trim());
      const lng = parseFloat(parts[1].trim());
      if (isNaN(lat) || isNaN(lng)) continue;
      const marker = L.marker([lat, lng], { icon: makeIcon(row.type) })
        .bindPopup(makePopup(row), { maxWidth: 260 });
      allMarkers.push({ marker, type: row.type });
      loaded++;
    }
    document.getElementById('status').textContent = `${loaded} location${loaded !== 1 ? 's' : ''} loaded. Select a category to explore.`;
  } catch(e) {
    document.getElementById('status').textContent = 'Error loading sheet — make sure it is published to web as CSV.';
  }
}

loadData();
</script>
</body>
</html>
